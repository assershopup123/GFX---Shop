<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFX Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<!-- Menu -->
<div class="menu-btn" onclick="toggleLangMenu()">
    <span></span><span></span><span></span>
</div>

<!-- Language Menu -->
<div class="lang-menu" id="langMenu">
    <button onclick="setLang('ar')">🇪🇬 العربية</button>
    <button onclick="setLang('en')">🇺🇸 English</button>
    <button onclick="setLang('fr')">🇫🇷 Français</button>
</div>

<header>
    <h1 id="title">🔥 GFX Shop</h1>
    <p id="subtitle">أفضل تصميمات احترافية</p>
    <a href="order.html" class="btn" id="orderBtn">اطلب الآن 🎮</a>
</header>

<section>
    <h2 id="galleryTitle">🎨 أعمالي</h2>
    
    <div class="gallery-grid">
        <img src="gfx1.jpg" class="click" onclick="openImg(this)" alt="GFX 1">
        <img src="gfx2.jpg" class="click" onclick="openImg(this)" alt="GFX 2">
        <img src="gfx3.jpg" class="click" onclick="openImg(this)" alt="GFX 3">
        <img src="gfx4.jpg" class="click" onclick="openImg(this)" alt="GFX 4">
    </div>
</section>

<!-- Popup -->
<div id="popup" onclick="if(event.target === this) closeImg();">
    <img id="popup-img" alt="Enlarged Image">
</div>

<script src="script.js"></script>
</body>
</html>
